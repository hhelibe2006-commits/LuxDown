name: Build Standalone Binaries

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # 3.12 完全可用，保持即可

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install nuitka

      # ------ 清理 macOS 环境（释放空间/缓存）------
      - name: Cleanup before build (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator
          sudo rm -rf /Applications/Xcode_*.app
          df -h

      # ------ 安装 Clang（Windows / Linux）------
      - name: Install Clang (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm -y --no-progress
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Install Clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      # macOS 自带 clang，无需额外安装

      # ------ Nuitka 编译 (每个平台使用各自的续行语法) ------
      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          nuitka --standalone --show-progress --plugin-enable=pyside6 src/main.py `
            --clang --jobs=1 --low-memory `
            --windows-console-mode=disable `
            --windows-icon-from-ico=src/LuxDown.ico `
            --windows-company-name="hhelibe2006" `
            --windows-product-name="LuxDown" `
            --windows-file-version=1.0.0.0 `
            --windows-product-version=1.0.0.0 `
            --windows-file-description=" 这是一款用于下载视频的软件" `
            --output-dir=build `
            --output-filename=LuxDown

      - name: Build with Nuitka (macOS) as .app bundle
        if: runner.os == 'macOS'
        run: |
          nuitka --standalone --show-progress --plugin-enable=pyside6 src/main.py \
            --clang --jobs=1 --low-memory \
            --output-dir=build \
            --output-filename=LuxDown \
            --macos-create-app-bundle \
            --macos-app-icon=./LuxDown.icns

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          nuitka --standalone --show-progress --plugin-enable=pyside6 src/main.py \
            --clang --jobs=1 --low-memory \
            --output-dir=build \
            --output-filename=LuxDown

      # ------ 上传构件 ------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuxDown-${{ runner.os }}
          path: |
            build/main.dist/**