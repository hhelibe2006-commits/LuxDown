name: Build AppImage

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

  jobs:
    build:
        runs-on: ubuntu-latest

        steps:
          - name: 检出仓库
            uses: actions/checkout@v4
            with:
              fetch-depth: 0

          - name: 切换版本
            run: git checkout ${{ github.event.inputs.tag }}

          - name: 设置Python环境
            uses: actions/setup-python@v5
            with:
                python-version: '3.12'

          - name: 安装依赖
            run: |
                python -m pip install --upgrade pip
                pip install .

          - name: Nuitka编译
            run: |
              python -m nuitka --standalone \
              --output-dir=build \
              --enable-plugin=pyside6 \
              --linux-icon=src/LuxDown.png \
              --output-filename=LuxDown \
              src/main.py

          - name: 下载ffmpeg
            run: |
              wget -q "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
              tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
              mkdir -p build/main.dist/ffmpeg
              cp ffmpeg-master-latest-linux64-gpl/ffmpeg ffmpeg-master-latest-linux64-gpl/ffprobe build/main.dist/ffmpeg/

          - name: 下载deno
            run: |
              wget -q "
