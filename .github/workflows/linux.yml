name: Build DEB Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.3)'
        required: true
        default: 'v1.0.3'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 切换到指定标签
        run: git checkout ${{ github.event.inputs.tag }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install nuitka

      - name: Nuitka 编译
        run: |
          python -m nuitka \
            --standalone \
            --output-dir=build \
            --enable-plugin=pyside6 \
            --assume-yes-for-downloads \
            --linux-icon=src/LuxDown.png \
            --output-filename=LuxDown \
            src/main.py

      # 准备 .deb 包的目录结构
      - name: 准备 DEB 打包目录
        run: |
          # 程序安装到 /opt/LuxDown
          mkdir -p deb/opt/LuxDown
          cp -r build/main.dist/* deb/opt/LuxDown/

          # 在 /usr/bin 创建启动链接
          mkdir -p deb/usr/bin
          ln -sf /opt/LuxDown/LuxDown deb/usr/bin/LuxDown

          # 添加桌面文件和图标
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/256x256/apps
          cp src/LuxDown.png deb/usr/share/icons/hicolor/256x256/apps/luxdown.png

          cat > deb/usr/share/applications/luxdown.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=LuxDown
          Comment=视频下载工具
          Exec=LuxDown
          Icon=luxdown
          Categories=Utility;
          Terminal=false
          EOF

      # 创建 DEBIAN/control 文件
      - name: 生成 control 文件
        run: |
          mkdir -p deb/DEBIAN
          # 从 tag 中提取版本号（去掉可能的 v 前缀）
          VERSION=$(echo "${{ github.event.inputs.tag }}" | sed 's/^v//')
          cat > deb/DEBIAN/control <<EOF
          Package: luxdown
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: hhelibe <your.email@example.com>
          Depends: ffmpeg
          Recommends: deno
          Description: LuxDown - 视频下载工具
           一款用于下载视频的软件。
           依赖系统已安装的 ffmpeg，推荐安装 deno。
          EOF

      # 可选：postinst 脚本，对 deno 给出友好提示
      - name: 生成 postinst 脚本
        run: |
          cat > deb/DEBIAN/postinst <<'EOF'
          #!/bin/sh
          if ! command -v deno >/dev/null 2>&1; then
              echo "============================================"
              echo " 提示：deno 未安装，部分功能可能不可用。"
              echo " 安装 deno：curl -fsSL https://deno.land/install.sh | sh"
              echo "============================================"
          fi
          EOF
          chmod 755 deb/DEBIAN/postinst

      - name: 构建 .deb 包
        run: |
          dpkg-deb --build deb
          mv deb.deb LuxDown-${{ github.event.inputs.tag }}-x64.deb

      - name: 上传 DEB 制品
        uses: actions/upload-artifact@v4
        with:
          name: LuxDown-${{ github.event.inputs.tag }}-deb
          path: LuxDown-${{ github.event.inputs.tag }}-x64.deb