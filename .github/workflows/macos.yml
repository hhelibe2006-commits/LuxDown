name: Build macOS App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.2)'
        required: true
        default: 'v1.0.2'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 切换版本
        run: git checkout ${{ github.event.inputs.tag }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install imageio

      - name: Nuitka 编译
        run: |
          python -m nuitka \
            --standalone \
            --output-dir=build \
            --enable-plugin=pyside6 \
            --assume-yes-for-downloads \
            --macos-create-app-bundle \
            --macos-app-icon=src/LuxDown.png \
            --output-filename=LuxDown \
            src/main.py

      - name: 下载 ffmpeg（macOS 静态构建）
        run: |
          wget -q "https://evermeet.cx/ffmpeg/ffmpeg-8.1.1.zip" -O ffmpeg.zip
          unzip -q ffmpeg.zip -d ffmpeg_tmp
          mkdir -p build/LuxDown.app/Contents/MacOS
          cp ffmpeg_tmp/ffmpeg build/LuxDown.app/Contents/MacOS/ffmpeg
          chmod +x build/LuxDown.app/Contents/MacOS/ffmpeg

      - name: 下载 deno（macOS）
        run: |
          wget -q "https://github.com/denoland/deno/releases/download/v2.7.14/deno-x86_64-apple-darwin.zip" -O deno.zip
          unzip -q deno.zip -d deno_tmp
          mkdir -p build/LuxDown.app/Contents/MacOS
          cp deno_tmp/deno build/LuxDown.app/Contents/MacOS/deno
          chmod +x build/LuxDown.app/Contents/MacOS/deno

      - name: 翻译
        run: |
          pyside6-lrelease src/*.ts
          mkdir -p build/LuxDown.app/Contents/MacOS
          cp src/*.qm build/LuxDown.app/Contents/MacOS/

      - name: 更新 Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.hhelibe.luxdown" build/LuxDown.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.tag }}" build/LuxDown.app/Contents/Info.plist

      - name: 打包为 DMG
        run: |
          mkdir -p dmg
          cp -R build/LuxDown.app dmg/
          brew install create-dmg
          create-dmg \
            --volname "LuxDown" \
            --volicon "src/LuxDown.icns" \
            --background "assets/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "LuxDown.app" 150 200 \
            --app-drop-link 450 200 \
            "LuxDown-${{ github.event.inputs.tag }}-x64.dmg" \
            dmg/

      - name: 上传 DMG 制品
        uses: actions/upload-artifact@v4
        with:
          name: LuxDown-macOS-${{ github.event.inputs.tag }}
          path: LuxDown-${{ github.event.inputs.tag }}-x64.dmg